name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish self-contained
        run: dotnet publish src/RiftSentry/RiftSentry.csproj -c Release -r win-x64 --self-contained true -o ./publish-sc -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:InvariantGlobalization=true -p:DebugType=none
      - name: Publish framework-dependent
        run: dotnet publish src/RiftSentry/RiftSentry.csproj -c Release -r win-x64 --self-contained false -o ./publish-fdd -p:DebugType=none
      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish-sc/* -DestinationPath RiftSentry-win-x64-self-contained.zip
          Compress-Archive -Path ./publish-fdd/* -DestinationPath RiftSentry-win-x64-framework-dependent.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            RiftSentry-win-x64-self-contained.zip
            RiftSentry-win-x64-framework-dependent.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ale4224/riftsentry-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/RiftSentry.SyncServer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
